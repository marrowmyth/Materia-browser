<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-src 'none'" />
    <title>Slash AI</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="ai-page.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sb-head">
          <div class="brand"><span class="sl">/</span>slash ai</div>
          <button id="collapse" class="icon-btn" type="button" title="Collapse sidebar" aria-label="Collapse sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
        </div>
        <button id="new-chat" class="new-chat" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="sb-text">New chat</span>
        </button>
        <div class="sb-section">Recent</div>
        <div id="chat-list"></div>
      </aside>

      <main id="main">
        <header id="topbar">
          <button id="expand" class="icon-btn hidden" type="button" title="Expand sidebar" aria-label="Expand sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
          <div class="spacer"></div>
          <div id="model-pill">
            <button id="model-btn" type="button" title="Choose model and CLI/API" aria-label="Choose model and CLI/API" aria-haspopup="true" aria-expanded="false">
              <img id="model-logo" alt="" />
              <span id="model-label">Claude</span>
              <span class="caret">&#9662;</span>
            </button>
            <div id="model-menu" class="hidden"></div>
          </div>
          <button id="open-web" class="icon-btn" type="button" title="Open on the web" aria-label="Open on the web">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
          <button id="dock" class="icon-btn" type="button" title="Dock to sidebar" aria-label="Dock to sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
          </button>
        </header>

        <div id="landing">
          <div class="landing-inner">
            <h1>Ready when you are.</h1>
            <p>Ask anything to start a new chat.</p>
            <div class="composer">
              <textarea id="landing-input" rows="1" placeholder="Message Slash AI" spellcheck="false" aria-label="Message Slash AI"></textarea>
              <div class="composer-row">
                <button class="send" id="landing-send" type="button" title="Send" aria-label="Send">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
              </div>
            </div>
            <div id="landing-starters" class="starters" aria-label="Conversation starters"></div>
          </div>
        </div>

        <div id="chat" class="hidden">
          <div id="thread"><div class="thread-inner" id="thread-inner"></div></div>
          <div id="composer-wrap">
            <div class="composer">
              <textarea id="chat-input" rows="1" placeholder="Message Slash AI" spellcheck="false" aria-label="Message Slash AI"></textarea>
              <div class="composer-row">
                <button class="send" id="chat-send" type="button" title="Send" aria-label="Send">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="ai-page.js"></script>
  </body>
</html>
